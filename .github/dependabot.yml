version: 2
updates:
  # Keep the pinned GitHub Actions SHAs current (Dependabot bumps SHA + comment).
  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']

  # devDependencies only (there are zero runtime deps).
  - package-ecosystem: npm
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        patterns: ['*']
    open-pull-requests-limit: 5
